<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product</title>


  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">


  <style>
    body {
      background-color: #0d1b2a;
      color: #f0f0f0;
    }


    .navbar {
      background-color: #1b263b;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }


    .navbar a,
    .navbar-brand {
      color: #f0f0f0;
      text-decoration: none;
    }


    .navbar a:hover {
      color: #38bdf8;
    }


    .form-container {
      max-width: 600px;
      margin: auto;
      background-color: #1b263b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }


    .form-label {
      color: #f0f0f0;
    }


    .btn-primary {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
      color: #f0f0f0;
    }


    .btn-primary:hover {
      background-color: #0d6efd;
    }
  </style>
</head>
<body>


<!-- Navbar -->



<!-- Edit Product Form -->
<div class="container my-5">
  <div class="form-container">
    <h3 class="text-center mb-4">Edit Product</h3>


    <form method="post" action="/updatedata" enctype="multipart/form-data">
    {% csrf_token %}


      <input type="hidden" name="productid" value="{{product.id}}">


      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control"name="productname" value="{{product.pname}}" placeholder="Enter product name" required>
      </div>


      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" name="catid" required>
          {% for i in category %}
          <option selected>{{product.catid.catname}}</option>
          <option>{{i.catname}}</option>
          {% endfor %}
        </select>
      </div>


      <div class="mb-3">
        <label class="form-label">Product Image</label><br>
        <img src="/media/{{product.pimg}}" width="100" class="mb-2"><br>
        <input type="file" class="form-control" name="pimg" accept="image/*">
      </div>


      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" class="form-control" name="price" value="{{product.price}}" min="0" step="0.01" required>
      </div>


      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="4" required>
            {{product.description}}
        </textarea>
      </div>


      <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" name="status" required>
          <option selected>Available</option>
          <option>Unavailable</option>
        </select>
      </div>


      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>


    </form>
  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
