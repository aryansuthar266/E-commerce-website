<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background-color: #0d1b2a;
            color: #f0f0f0;
        }
        .navbar {
            background-color: #1b263b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .table {
            background-color: #1b263b;
            border-radius: 10px;
            overflow: hidden;
        }
        .table th {
            background-color: #23395d;
            color: #f0f0f0;
        }
        .table tbody tr:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .btn-action {
            padding: 5px 10px;
            font-size: 14px;
        }
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>


<body>


<!-- Navbar -->
{%include 'nav.html'%}

<!-- Manage Products Table -->
<div class="container my-5">
    <h3 class="text-center mb-4">My Products</h3>

    {% if items %}
    <div class="table-responsive">
        <table class="table table-dark table-hover text-center">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total Amount</th>
                </tr>
            </thead>


            <tbody>
            {% for item in items %}
                <tr>
                    <td>{{ item.orderid }}</td>
                    <td>{{ item.userid.name }}</td>
                    <td>{{ item.productid.pname }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>{{ item.totalprice }}</td>

                </tr>

            {% endfor %}
<!--                <tr>-->
<!--                    <td>3</td>-->
<!--                    <td><img src="https://via.placeholder.com/50" class="product-img"></td>-->
<!--                    <td>Wireless Headphones</td>-->
<!--                    <td>Accessories</td>-->
<!--                    <td>Rs. 2,499</td>-->
<!--                    <td>Noise cancellation headphones</td>-->
<!--                    <td>-->
<!--                        <button class="btn btn-sm btn-warning btn-action">✏️ Edit</button>-->
<!--                        <button class="btn btn-sm btn-danger btn-action">🗑️ Delete</button>-->
<!--                    </td>-->
<!--                </tr>-->
<!--            -->

            </tbody>
        </table>
        {% else %}
            <center><h1>No Order Received</h1></center>
        {% endif %}
    </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
