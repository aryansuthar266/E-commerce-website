  <title>Select Related</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #0d1b2a; color: #f0f0f0; }
    .table-dark-custom {
      background-color: #1b263b;
      color: #f0f0f0;
      border-radius: 10px;
    }
    .table-dark-custom thead {
      background-color: #0d1b2a;
      color: #38bdf8;
    }
    .seller-badge {
      background-color: #1e3a5f;
      color: #38bdf8;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .category-badge {
      background-color: #1e3a2f;
      color: #10b981;
      padding: 4px 10px;
      border-radius: 20px;
    }
  </style>
</head>


<body>

{% include 'nav.html'%}
<div class="container my-5">
  <h2 class="text-center mb-4">select_related() — One Query for All</h2>


  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-dark-custom">
      <thead>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Price</th>
          <th>Category</th>
          <th>Seller</th>
          <th>Status</th>
          <th>View</th>
        </tr>
      </thead>


      <tbody>


        <!-- ROW 1 -->

            {% for i in product %}
             <tr>
                  <td>{{i.id}}</td>
                  <td>
                    <div style="display:flex; gap:10px;">
                      <img src="/media/{{i.pimg}}" style="width:45px; height:45px;">
                      <span>Watch</span>
                    </div>
                  </td>
                  <td style="color:#38bdf8;">Rs. {{i.price}}</td>
                  <td><span class="category-badge">{{i.catid}}</span></td>
                  <td><span class="seller-badge">{{i.sellerid}}</span></td>
                  <td><span class="badge bg-success">{{i.status}}</span></td>
                  <td><a href="/singleproduct/{{i.id}}" class="btn btn-sm btn-outline-info">View</a></td>
                  </tr>
            {% endfor %}
