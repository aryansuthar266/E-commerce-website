<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#0d1b2a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#1b263b;
color:#f0f0f0;
border:none;
width:100%;
max-width:420px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.form-label{
color:#f0f0f0;
}

.btn-primary{
background:#1d4ed8;
border:none;
}

.btn-primary:hover{
background:#2563eb;
}

.input-group-text{
background:#1b263b;
border-left:0;
cursor:pointer;
}

#passwordIcon{
color:white;
}

a{
color:#38bdf8;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
{% if massages%}
{% for msg in massages %}
<script>alert{'{{msg}}'}</script>
{% endfor %}
{% endif %}
</head>

<body>

<div class="card p-4">

    <h3 class="text-center mb-4">Forgot Password</h3>

    <form method="POST" action="/forgotpassword">
    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">Email</label>

        <input type="email" class="form-control" name="email" required>

    </div>

        <!--<div class="mb-3">-->

        <!--<label class="form-label">Password</label>-->

        <!--<div class="input-group">-->

        <!--<input type="password" class="form-control" id="password" name="upassword" required>-->

        <!--<span class="input-group-text" id="togglePassword">-->

        <!--<i class="bi bi-eye" id="passwordIcon"></i>-->

        <!--</span>-->

        <!--</div>-->

        <!--</div>-->

        <button class="btn btn-primary w-100">Send Mail</button>

    </form>


    <p class="text-center mt-3">Don't have account ?<a href="/registerdata">Register</a></p>

</div>

    <script>

    document.getElementById('togglePassword').addEventListener('click',function(){

    const password=document.getElementById('password')
    const icon=document.getElementById('passwordIcon')

    if(password.type==='password'){

    password.type='text'
    icon.classList.replace('bi-eye','bi-eye-slash')

    }
    else{

    password.type='password'
    icon.classList.replace('bi-eye-slash','bi-eye')

    }

    })

    </script>

</body>
</html>
