<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#0d1b2a;
color:#f0f0f0;
}

.navbar{
background:#1b263b;
}

.navbar a{
color:#f0f0f0;
}

.navbar a:hover{
color:#38bdf8;
}

.dropdown-menu{
background:#1b263b;
}

.dropdown-item{
color:#f0f0f0;
}

.dropdown-item:hover{
background:#38bdf8;
color:#0d1b2a;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product-card{
background:#1b263b;
border:none;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.product-img{
height:220px;
object-fit:cover;
}

.price{
color:#38bdf8;
font-size:18px;
font-weight:bold;
}

h6{
    color:white;
    }
</style>

</head>

<body>

<!-- Navbar -->

{% include 'nav.html' %}

<div class="container my-5">

    <h2 class="text-center mb-4">Wishlist</h2>

    <div class="row">

    {% for i in product %}

    <div class="col-md-3 mb-4">

        <div class="card product-card h-100">

            <a href="/singleproduct/{{i.id}}"><img src="/media/{{i.productid.pimg}}" class="card-img-top product-img"></a>

            <div class="card-body text-center">

                <h6>{{i.productid.name}}</h6>
                <p class="price">₹ {{i.productid.price}}</p>

                <a href="/removewishlist/{{i.productid.id}}"><button class="btn btn-danger">Remove from Wishlist</button></a>

            </div>

        </div>

    </div>

    {% endfor %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
