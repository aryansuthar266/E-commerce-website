<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Count</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


  <style>
    body { background-color: #0d1b2a; color: #f0f0f0; }
    .navbar { background-color: #1b263b; }
    .stat-card {
      background-color: #1b263b;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .stat-number { font-size: 2.5rem; font-weight: bold; }
    .stat-label { font-size: 0.95rem; color: #a0aec0; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background-color: #1b263b;
      color: #fff;
      border: none;
    }
    .card img {
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>


<body>


<div class="container my-5">
  <h2 class="text-center mb-4">Product Statistics</h2>


  <!-- Stats -->
  <div class="row g-4 mb-5">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number text-info" id="t_pro">{{t_pro}}</div>
        <div class="stat-label"><i class="bi bi-box-seam"></i> Total Products</div>
      </div>
    </div>


    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number text-success" id="avail_pro">{{avail_pro}}</div>
        <div class="stat-label"><i class="bi bi-check-circle"></i> Available</div>
      </div>
    </div>


    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number text-danger" id="unavail_pro">{{unavail_pro}}</div>
        <div class="stat-label"><i class="bi bi-x-circle"></i> Unavailable</div>
      </div>
    </div>
      <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number text-info" id="t_user">{{t_user}}</div>
        <div class="stat-label"> total user</div>
      </div>
    </div>
      <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-number text-info" id="t_seller">{{t_seller}}</div>
            <div class="stat-label"> total seller</div>
          </div>
        </div>

  </div>


  <!-- Products -->
  <h4 class="mb-3">All Products</h4>
  <div class="products-grid" id="productList"></div>
    {% for i in pro %}
      <div class="card">
        <a href="/singleproduct/{{i.id}}"><img src="media/{{i.pimg}}" class="card-img-top" alt="Product 1"></a>
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <span class="product-name">{{i.pname}}</span>
            <span class="product-price">Rs.{{i.price}}</span>
          </div>
        </div>
      </div>
      {% endfor %}
</div>



<script>
  // 🔹 Dummy Data (replace with API later)
  const data = [
    {id:product.id, name:"product.name", price:product.price, status:"product.status", pimage:"product.pimg"},
  ];


  // 🔹 Calculations
  let total = data.length;
  let available = data.filter(p => p.status.toLowerCase() === "available").length;
  let unavailable = total - available;


  // 🔹 Set Stats
  document.getElementById("total").innerText = total;
  document.getElementById("available").innerText = available;
  document.getElementById("unavailable").innerText = unavailable;


  // 🔹 Render Products
  let container = document.getElementById("productList");


  data.forEach(p => {
    let badge = p.status.toLowerCase() === "available"
      ? `<span class="badge bg-success">${p.status}</span>`
      : `<span class="badge bg-danger">${p.status}</span>`;


    container.innerHTML += `
      <div class="card">
        <img src="${p.pimage}" class="card-img-top">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <span>${p.name}</span>
            <span class="text-info">Rs. ${p.price}</span>
          </div>
          ${badge}
        </div>
      </div>
    `;
  });
</script>


</body>
</html>
