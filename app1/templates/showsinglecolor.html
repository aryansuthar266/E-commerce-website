<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #0d1b2a;
  color: #f0f0f0;
}

.product-page {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 50px;
}

.product-image {
  width: 50%;
  text-align: center;
}

.product-details {
  width: 45%;
}

.product-price {
  color: #38bdf8;
  font-size: 1.5rem;
}

.swatch {
  display: inline-block;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  margin-right: 5px;
}
</style>
</head>

<body>

<div class="container product-page">

  <!-- IMAGE -->
  <div class="product-image">
    <img id="mainImage" src="/media/{{product.pimg}}" hight="550px" width='500px' alt="Product Image">
  </div>

  <!-- DETAILS -->
  <div class="product-details">
    <h2>{{ product.pname }}</h2>
    <div class="product-price">₹ {{ product.price }}</div>

    <p>{{ product.description }}</p>

    <!-- COLORS -->
    <div class="mt-3">
      {% if product.color.all %}
        {% for c in product.color.all %}
          <span class="swatch" style="background-color: {{ c.colorcode }}"></span>
        {% endfor %}
      {% else %}
        <span class="badge bg-danger">No Color Available</span>
      {% endif %}
    </div>

    <!-- QUANTITY -->
    <label class="mt-3">Quantity:</label>
    <select class="form-select w-25">
      <option>1</option>
      <option>2</option>
      <option>3</option>
    </select>

    <button class="btn btn-primary mt-3">Add to Cart</button>

  </div>

</div>

</body>
</html>
